<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pedido</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-a: #eef4ff;
            --bg-b: #dfe9fb;
            --card: #ffffff;
            --text: #1f2c40;
            --muted: #667893;
            --accent: #1b5fd1;
            --accent-2: #9cc3ff;
            --line: #d9e4f7;
        }

        body {
            font-family: "Manrope", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, rgba(27, 95, 209, 0.14), transparent 28%),
                radial-gradient(circle at 90% 0%, rgba(89, 150, 255, 0.18), transparent 32%),
                linear-gradient(145deg, var(--bg-a), var(--bg-b));
            min-height: 100vh;
        }

        .form-shell {
            max-width: 980px;
            margin: 36px auto;
            border: 0;
            border-radius: 24px;
            background: var(--card);
            box-shadow: 0 20px 55px rgba(29, 66, 129, 0.16);
            overflow: hidden;
        }

        .form-header {
            padding: 28px 32px;
            background: linear-gradient(110deg, #1b5fd1, #3a8bff);
            color: #fff;
        }

        .form-header h2 {
            margin: 0;
            font-weight: 800;
            letter-spacing: 0.2px;
        }

        .form-header p {
            margin: 6px 0 0;
            opacity: 0.9;
        }

        .top-meta {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .meta-chip {
            font-size: 0.78rem;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 999px;
            padding: 5px 10px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .form-body {
            padding: 28px 32px 32px;
        }

        .data-block {
            padding: 16px;
            background: #f8fbff;
            border: 1px solid var(--line);
            border-radius: 16px;
            margin-bottom: 18px;
        }

        .section-title {
            font-size: 0.93rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: "";
            width: 24px;
            height: 3px;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), #6ca7ff);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .product-card {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            background: #ffffff;
            transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(38, 79, 146, 0.12);
        }

        .product-card.selected {
            border-color: #8fb5f4;
            box-shadow: 0 0 0 2px rgba(27, 95, 209, 0.12);
            background: #f9fcff;
        }

        .product-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .product-name {
            font-weight: 700;
            margin: 0;
        }

        .price-pill {
            background: var(--accent-2);
            color: #16315d;
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 0.86rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .stock-label {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .qty-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .product-toggle {
            transform: scale(1.15);
            margin-right: 6px;
            accent-color: var(--accent);
        }

        .qty-row input[type="number"] {
            max-width: 90px;
        }

        .qty-input:disabled {
            background: #eef1f7;
            color: #8ca0bf;
            cursor: not-allowed;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
            border-top: 1px solid var(--line);
            padding-top: 18px;
        }

        .btn-main {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 700;
            padding: 10px 18px;
        }

        .btn-main:hover {
            background: #134ca8;
            border-color: #134ca8;
        }

        @media (max-width: 768px) {
            .form-shell {
                margin: 18px auto;
                border-radius: 18px;
            }

            .form-header,
            .form-body {
                padding: 20px;
            }

            .actions {
                position: sticky;
                bottom: 0;
                background: #ffffff;
                padding: 14px 0 2px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-shell">
        <div class="form-header">
            <h2>Nuevo Pedido</h2>
            <p>Carga rápida del pedido para caja o mostrador.</p>
            <div class="top-meta">
                <span class="meta-chip">Uso interno</span>
                <span class="meta-chip">Turno activo</span>
                <span class="meta-chip">Control de stock</span>
            </div>
        </div>

        <div class="form-body">
            <form method="post">
                <div class="data-block">
                    <div class="row g-3 mb-0">
                    <div class="col-md-5">
                        <label class="form-label fw-semibold">Nombre del cliente</label>
                        <input type="text" name="cliente" class="form-control form-control-lg" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Tipo de pedido</label>
                        <select name="tipo" class="form-select form-select-lg" required onchange="document.getElementById('mesa').disabled = (this.value=='delivery')">
                            <option value="local">Local</option>
                            <option value="delivery">Delivery</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Mesa (solo local)</label>
                        <input type="number" name="mesa" id="mesa" class="form-control form-control-lg" value="1" min="1">
                    </div>
                    </div>
                </div>

                <div class="section-title">Selección de productos</div>

                <div class="product-grid">
                    {% for codigo, nombre, precio, stock in productos %}
                    <div class="product-card">
                        <div class="product-head">
                            <p class="product-name">{{nombre}}</p>
                            <span class="price-pill">${{precio}}</span>
                        </div>
                        <div class="stock-label">Stock disponible: {{stock}}</div>
                        <div class="qty-row">
                            <div class="form-check mb-0">
                                <input class="form-check-input product-toggle" type="checkbox" name="producto" value="{{codigo}}" id="p_{{codigo}}">
                                <label class="form-check-label fw-semibold" for="p_{{codigo}}">Agregar</label>
                            </div>
                            <input type="number" name="cantidad_{{codigo}}" value="1" min="1" max="{{stock}}" class="form-control qty-input" disabled>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <div class="actions">
                    <div class="me-auto d-flex align-items-center gap-2">
                        <div>
                            <label class="form-label mb-1">Estado</label>
                            <select name="estado" class="form-select">
                                <option value="finalizar">Finalizar inmediatamente</option>
                                <option value="pendiente">Guardar como pendiente</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label mb-1">Descuento operador (%)</label>
                            <input type="text" name="descuento" class="form-control" placeholder="ej. 25 para 25%">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-main btn-lg">Crear Pedido</button>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-lg">Volver</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    const toggles = document.querySelectorAll('.product-toggle');

    toggles.forEach((toggle) => {
        const card = toggle.closest('.product-card');
        const qtyInput = card.querySelector('.qty-input');

        const syncState = () => {
            const checked = toggle.checked;
            card.classList.toggle('selected', checked);
            qtyInput.disabled = !checked;
        };

        syncState();
        toggle.addEventListener('change', syncState);
    });
</script>
</body>
</html>
