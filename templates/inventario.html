<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-a: #f4f8ff;
            --bg-b: #e8eef9;
            --card: #ffffff;
            --text: #1f2a3a;
            --muted: #64748b;
            --primary: #1d63d8;
            --primary-2: #3e86ff;
            --danger: #cf2f43;
            --border: #dbe5f3;
        }

        body {
            font-family: "Manrope", sans-serif;
            color: var(--text);
            min-height: 100vh;
            background:
                radial-gradient(circle at 5% 0%, rgba(62, 134, 255, 0.16), transparent 25%),
                radial-gradient(circle at 95% 10%, rgba(29, 99, 216, 0.14), transparent 28%),
                linear-gradient(145deg, var(--bg-a), var(--bg-b));
        }

        .page-shell {
            max-width: 1080px;
            margin: 34px auto;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 18px 46px rgba(29, 55, 90, 0.14);
            overflow: hidden;
        }

        .page-header {
            padding: 24px 28px;
            background: linear-gradient(115deg, var(--primary), var(--primary-2));
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .page-title {
            margin: 0;
            font-weight: 800;
            letter-spacing: 0.2px;
        }

        .page-subtitle {
            margin: 4px 0 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-light-outline {
            border: 1px solid rgba(255, 255, 255, 0.8);
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-light-outline:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .content-wrap {
            padding: 22px 24px 26px;
        }

        .summary-bar {
            background: #f7faff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 14px;
            color: var(--muted);
            font-weight: 600;
        }

        .inventory-table {
            margin: 0;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .inventory-table thead th {
            background: #eef4ff;
            color: #1e3a5f;
            border-bottom: 1px solid var(--border);
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .inventory-table td,
        .inventory-table th {
            vertical-align: middle;
            padding: 14px 12px;
            border-color: var(--border);
        }

        .stock-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            background: #e8f1ff;
            color: #1d4ea3;
            font-weight: 700;
            min-width: 42px;
            text-align: center;
        }

        .price-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 999px;
            background: #ecfdf3;
            color: #13603f;
            font-weight: 700;
        }

        .btn-danger-soft {
            background: var(--danger);
            border-color: var(--danger);
            font-weight: 700;
        }

        .btn-danger-soft:hover {
            background: #b5293a;
            border-color: #b5293a;
        }
    </style>
</head>
<body>
<div class="container">
    <section class="page-shell">
        <header class="page-header">
            <div>
                <h2 class="page-title">Inventario</h2>
                <p class="page-subtitle">Control diario de productos, stock y precios.</p>
            </div>
            <div class="header-actions">
                <a href="{{ url_for('agregar_producto') }}" class="btn btn-light text-primary fw-bold">Agregar producto</a>
                <a href="{{ url_for('index') }}" class="btn btn-light-outline">Volver</a>
            </div>
        </header>

        <div class="content-wrap">
            <div class="summary-bar">Total de productos cargados: {{ productos|length }}</div>

            <div class="table-responsive">
                <table class="table inventory-table">
                    <thead>
                        <tr><th>Código</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
                    </thead>
                    <tbody>
                    {% for codigo, nombre, precio, stock in productos %}
                    <tr>
                        <td><strong>{{codigo}}</strong></td>
                        <td>{{nombre}}</td>
                        <td><span class="price-pill">${{precio}}</span></td>
                        <td><span class="stock-pill">{{stock}}</span></td>
                        <td>
                            <a href="{{ url_for('eliminar_producto', codigo=codigo) }}" class="btn btn-danger-soft btn-sm">Eliminar</a>
                        </td>
                    </tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>
</body>
</html>
